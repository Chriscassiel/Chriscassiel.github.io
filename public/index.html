<body class="dark-theme">
    <nav class="glass-nav">
        <div class="nav-content">
            <a href="/" class="logo">MOTO<span>COMPARADOR</span></a>
            <ul class="nav-links">
                <li><a href="/comparador" data-route>Nuevas</a></li>
                <li><a href="/equipamiento" data-route>Equipamiento</a></li>
                <li><a href="/segunda-mano" data-route>Segunda Mano</a></li>
                <li><a href="/motogp" data-route>MotoGP</a></li>
            </ul>
            <div class="header-actions">
                <button id="theme-btn" class="icon-btn">🌓</button>
            </div>
        </div>
    </nav>

    <main id="app">
        <!-- Dynamic Content Injected Here -->
        <div class="loader">Grupando pistones...</div>
    </main>

    <footer class="glass-footer">
        <div class="footer-grid">
            <div class="footer-links">
                <h4>Fuentes Oficiales</h4>
                <ul>
                    <li><a href="https://motos.coches.net/fichas_tecnicas/comparar.aspx" target="_blank">Coches.net

                    <li><a href="https://www.motocard.com/" target="_blank">Motocard (Equipamiento)</a></li>
                    <li><a href="https://motos.coches.net/" target="_blank">Coches.net (Usadas)</a></li>
                    <li><a href="https://www.motogp.com/" target="_blank">MotoGP Official</a></li>
                </ul>
            </div>
            <p>&copy; 2026 MOTOCOMPARADOR Platform. Diseñado para la excelencia SEO.</p>
        </div>
    </footer>

    <!-- Templates -->
    <template id="tpl-home">
        <section class="hero-full">
            <h1>Pasión por las dos ruedas</h1>
            <p>La plataforma definitiva de comparativas y equipamiento.</p>
            <div class="hero-grid">
                <a href="/comparador" class="hero-card">Motos Nuevas</a>
                <a href="/equipamiento" class="hero-card">Equipamiento</a>
                <a href="/segunda-mano" class="hero-card">Segunda Mano</a>
                <a href="/motogp" class="hero-card">MotoGP News</a>
            </div>
        </section>
    </template>

    <template id="tpl-comparador">
        <section class="section">
            <div class="header-box">
                <h2>Comparador de Motos Nuevas</h2>
                <div class="comparison-bar" id="comparison-bar">
                    <!-- Comparison slots -->
                </div>
            </div>
            <div class="grid" id="moto-grid"></div>
        </section>
    </template>

    <template id="tpl-moto-detail">
        <section class="detail-page">
            <div id="moto-content"></div>
            <div class="official-src">
                Fuente: <a href="https://motos.coches.net/fichas_tecnicas/comparar.aspx" target="_blank">Ver en
                    Coches.net</a>
            </div>
        </section>
    </template>

    <script src="/js/config.js"></script>
    <script src="/js/app.js"></script>
