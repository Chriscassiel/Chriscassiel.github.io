name: Update Trends and News

on:
  schedule:
    - cron: '0 0,12 * * *' # Every 12 hours
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser

      - name: Fetch News and Trends
        run: |
          python fetch_news.py
          python fetch_trends.py

      - name: Commit and push changes
        run: |
          git config --global user.name "MOTOCOMP Bot"
          git config --global user.email "actions@github.com"
          git add news.json trends.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update trends and news" && git push)
